      <button class="sb" data-v="week" onclick="setV('week')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="14" x2="17" y2="14"/><line x1="7" y1="18" x2="13" y2="18"/></svg> Week</button>
      <button class="sb" data-v="day" onclick="setV('day')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><rect x="7" y="14" width="4" height="4" rx="1" fill="currentColor" stroke="none"/></svg> Day</button>
    </div>

  </div>
</div>

<div class="content">

<script>
const CATS_DEF=[
  {id:'all',l:'All Events',dot:'#8e8e93'},

];
const CM={};CATS_DEF.forEach(c=>CM[c.id]=c);

<script>
const iso=d=>d.toISOString().slice(0,10);
const TD=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const dt=s=>new Date(s+'T12:00:00');
const fmtS=s=>dt(s).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fmtL=s=>dt(s).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const fmtMo=(y,m)=>new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
const gws=d=>{const w=new Date(d);w.setDate(w.getDate()-w.getDay());return iso(w);};
const phr=t=>{if(!t)return-1;const m=t.match(/(\d+)(?::(\d+))?\s*(AM|PM)/i);if(!m)return-1;let h=parseInt(m[1]);if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return h;};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let SEED=[], events=[];
let Cat='all',View='month',Reg='all',Dark=true,Ven='all';
let calY=2026,calM=5,calDay=TD(),ws=gws(new Date()),SQ='';
let tipTimer=null,tipEl=null;

function ls(k){try{return localStorage.getItem(k);}catch(x){return null;}}
function lw(k,v){try{localStorage.setItem(k,v);}catch(x){}}

function boot(){
  const s=ls('rth_ue');
  if(s){try{JSON.parse(s).forEach(ev=>{if(!events.find(x=>x.id===ev.id))events.push(ev);});}catch(x){}}
  const dm=ls('rth_dark');
  if(dm==='0'){Dark=false;applyDark();}
  tipEl=document.getElementById('tip');
  // Support shared links: ?view=day&date=YYYY-MM-DD | ?view=week&date=YYYY-MM-DD | ?view=month&y=2026&m=6
  try{
    const params=new URLSearchParams(window.location.search);
    const sharedDate=params.get('date');
    const sharedView=params.get('view');
    const sharedY=params.get('y');
    const sharedM=params.get('m');
    if(sharedDate&&/^\d{4}-\d{2}-\d{2}$/.test(sharedDate)){
      calDay=sharedDate;
      const d=dt(sharedDate);
      calY=d.getFullYear();calM=d.getMonth();
      if(sharedView==='week')ws=gws(d);
    }
    if(sharedY&&sharedM!==null&&/^\d{4}$/.test(sharedY)&&/^\d{1,2}$/.test(sharedM)){
      calY=parseInt(sharedY,10);calM=parseInt(sharedM,10);
    }
    if(sharedView==='day'||sharedView==='week'||sharedView==='month'){
      View=sharedView;
      document.querySelectorAll('.vseg .sb').forEach(b=>b.classList.toggle('on',b.dataset.v===sharedView));
    }
  }catch(x){}
  buildMoSel();buildVenueSel();render();
}

function applyDark(){
  document.body.classList.toggle('light',!Dark);
  const i=document.getElementById('dico');
  const l=document.getElementById('dlbl');
  if(i)i.className=Dark?'ti ti-sun':'ti ti-moon';
  if(l)l.textContent=Dark?'Dark':'Light';
}
function toggleDark(){Dark=!Dark;lw('rth_dark',Dark?'1':'0');applyDark();}

function setR(r){Reg=r;Ven='all';const vs=document.getElementById('vensel');if(vs)vs.value='all';document.querySelectorAll('.rseg .sb').forEach(b=>b.classList.toggle('on',b.dataset.r===r));buildMoSel();buildVenueSel();render();}
function setV(v){View=v;document.querySelectorAll('.vseg .sb').forEach(b=>b.classList.toggle('on',b.dataset.v===v));render();}
function setCat(id){
  // If clicking the already-active filter, toggle it off back to "all"
  if(Cat===id && id!=='all') id='all';
  Cat=id;
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p.dataset.c===id));
  buildMoSel();buildVenueSel();render();
}

function getF(){
  const today=TD();
  let ev=events.filter(x=>x&&typeof x.date==='string'&&(x.end?x.end>=today:x.date>=today));
  if(Reg!=='all')ev=ev.filter(x=>!x.region||x.region===Reg);
  if(Cat==='free')ev=ev.filter(x=>x.isFree);
  else if(Cat!=='all')ev=ev.filter(x=>x.cat===Cat);
  if(Ven!=='all')ev=ev.filter(x=>x.venue===Ven);
  if(SQ){const q=SQ.toLowerCase();ev=ev.filter(x=>(String(x.title||'')+String(x.venue||'')+String(x.desc||'')+(x.tags||[]).join(' ')+String(x.src||'')).toLowerCase().includes(q));}
  const mo=document.getElementById('mosel');
  if(mo&&mo.value)ev=ev.filter(x=>x.date.startsWith(mo.value));
  const sort=(document.getElementById('srtsel')||{}).value||'date';
  if(sort==='cat')ev.sort((a,b)=>String(a.cat||'').localeCompare(String(b.cat||''))||a.date.localeCompare(b.date));
  else if(sort==='free')ev.sort((a,b)=>(b.isFree?1:0)-(a.isFree?1:0)||a.date.localeCompare(b.date));
  else if(sort==='az')ev.sort((a,b)=>String(a.title||'').localeCompare(String(b.title||'')));
  else if(sort==='venue')ev.sort((a,b)=>String(a.venue||'').localeCompare(String(b.venue||''))||a.date.localeCompare(b.date));
  else ev.sort((a,b)=>a.date.localeCompare(b.date));
  return ev;
}

function buildMoSel(){
  const sel=document.getElementById('mosel');if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">All upcoming</option>';
  const seen=new Set();
  getF().filter(x=>x.date>=TD()).sort((a,b)=>a.date.localeCompare(b.date)).forEach(x=>{
    const k=x.date.slice(0,7);
    if(!seen.has(k)){seen.add(k);const o=document.createElement('option');o.value=k;o.textContent=dt(x.date).toLocaleDateString('en-US',{month:'long',year:'numeric'});sel.appendChild(o);}
  });
  if(cur)sel.value=cur;
}

function buildVenueSel(){
  const sel=document.getElementById('vensel');if(!sel)return;
  const cur=Ven;
  let ev=events.filter(x=>x.date>=TD());
  if(Reg!=='all')ev=ev.filter(x=>!x.region||x.region===Reg);
  if(Cat==='free')ev=ev.filter(x=>x.isFree);
  else if(Cat!=='all')ev=ev.filter(x=>x.cat===Cat);
  if(SQ)ev=ev.filter(x=>(x.title+x.venue+x.desc).toLowerCase().includes(SQ.toLowerCase()));
  const venues=[...new Set(ev.map(x=>x.venue).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  sel.innerHTML='<option value="all">All Venues</option>';
  venues.forEach(v=>{
    const o=document.createElement('option');
    o.value=v;o.textContent=v;
    if(v===cur)o.selected=true;
    sel.appendChild(o);
  });
}

function render(){
  const f=getF();
  const cc=document.getElementById('ev-cnt');if(cc)cc.textContent=f.length+' event'+(f.length!==1?'s':'');
  const tt=document.getElementById('ev-total');if(tt)tt.textContent=events.length+' events';
  const main=document.getElementById('main');if(!main)return;
  if(View==='month'){main.innerHTML=rMonth();main.style.overflow='hidden';attachMon();}
  else if(View==='week'){main.innerHTML=rWeek();main.style.overflow='hidden';}
  else{
    main.innerHTML=rDay();
    main.style.overflow='visible';
    requestAnimationFrame(()=>{
      const dl=document.querySelector('.day-list');
      if(dl){
        const top=dl.getBoundingClientRect().top;
        dl.style.maxHeight=(window.innerHeight-top-8)+'px';
        dl.style.overflowY='scroll';
      }
    });
  }
  // attach chip clicks (non-month) and row clicks
  document.querySelectorAll('[data-eid]').forEach(el=>{
    el.addEventListener('click',function(ev){ev.stopPropagation();openDet(this.dataset.eid);});
  });
}

// ── MONTH ─────────────────────────────────────────────────
function rMonth(){
  const f=getF();
  const byDay={};
  f.forEach(ev=>{
    const s=dt(ev.date),en=ev.end?dt(ev.end):s;
    for(let d=new Date(s);d<=en;d.setDate(d.getDate()+1)){
      if(d.getFullYear()===calY&&d.getMonth()===calM){
        // Only show on today or future days — use local date string
        const dStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        if(dStr>=TD()){
          const k=d.getDate();if(!byDay[k])byDay[k]=[];
          if(!byDay[k].find(x=>x.id===ev.id))byDay[k].push(ev);
        }
      }
    }
  });
  const fd=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const ts=TD();
  const DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let h=`<div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)" title="Previous month" aria-label="Previous month">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="cal-title">${fmtMo(calY,calM)}</span>
      <button class="cal-nav" onclick="calNav(1)" title="Next month" aria-label="Next month">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="today-btn" onclick="goToday()">Today</button>
      <button class="today-btn" onclick="shareMonth()" title="Share this month" aria-label="Share this month" style="margin-left:4px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:4px"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>Share
      </button>
    </div>
    <div class="month-scroll" id="month-scroll"><div class="dow-row">`;
  DOWS.forEach(d=>{h+=`<div class="dow">${d}</div>`;});
  h+=`</div><div class="month-grid" id="month-grid">`;
  for(let i=0;i<fd;i++)h+=`<div class="dcell ec"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===ts;
    const devs=byDay[d]||[];
    // We'll render ALL chips but hide overflowing ones via JS after layout
    h+=`<div class="dcell${isT?' today':''}" data-cd="${d}" data-total="${devs.length}">
      <span class="dnum">${d}</span>
      ${devs.map(ev=>{const c=CM[ev.cat]||CM.community;return`<div class="chip" style="border-left-color:${c.dot}" data-eid="${ev.id}">${esc(ev.title)}</div>`;}).join('')}
    </div>`;
  }
  const rem=(7-((fd+days)%7))%7;
  for(let i=0;i<rem;i++)h+=`<div class="dcell ec"></div>`;
  h+=`</div></div></div>`;
  return h;
}

function attachMon(){
  // ── Set grid-template-rows so cells have equal forced heights ──────────────
  function setRowHeights(){
    const scroll = document.getElementById('month-scroll');
    const grid   = document.getElementById('month-grid');
    if(!scroll || !grid) return;

    const totalCells = grid.children.length;
    const numRows    = Math.ceil(totalCells / 7);
    if(numRows < 1) return;

    // Measure from window — reliable regardless of flex chain quirks
    const topbar  = document.querySelector('.topbar');
    const fbar    = document.querySelector('.fbar');
    const pills   = document.querySelector('.pills');
    const calHdr  = document.querySelector('.cal-header');
    const dowRow  = scroll.querySelector('.dow-row');

    const topbarH = topbar  ? topbar.offsetHeight  : 50;
    const fbarH   = fbar    ? fbar.offsetHeight    : 36;
    const pillsH  = pills   ? pills.offsetHeight   : 32;
    const calHdrH = calHdr  ? calHdr.offsetHeight  : 44;
    const dowH    = dowRow  ? dowRow.offsetHeight   : 24;

    // Total used = topbar + content padding(14px top+bot) + gap(6px)*2 + fbar + pills + cal-header + dow-row
    const used = topbarH + 14 + 12 + fbarH + 6 + pillsH + 6 + calHdrH + dowH;
    const available = window.innerHeight - used;
    const rowH = Math.max(28, Math.floor(available / numRows));

    grid.style.gridTemplateRows = `repeat(${numRows}, ${rowH}px)`;
    trimChips();
  }

  // ── Trim chips to fit each cell exactly ────────────────────────────────────
  function trimChips(){
    const grid = document.getElementById('month-grid');
    if(!grid) return;

    grid.querySelectorAll('.dcell:not(.ec)').forEach(cell => {
      // Remove old more-badge
      cell.querySelectorAll('.more-badge').forEach(b => b.remove());

      const chips = Array.from(cell.querySelectorAll('.chip'));
      chips.forEach(c => c.style.display = ''); // reset all visible

      if(!chips.length) return;

      const cellH  = cell.offsetHeight;
      const dnumH  = 25; // date number row
      const padH   = 4;  // top+bottom padding
      const chipH  = 21; // chip height (20px) + 1px margin
      const badgeH = 14; // "+N more" badge height
      const available = cellH - dnumH - padH;

      if(available < chipH) {
        // Cell too small to show anything meaningful
        chips.forEach(c => c.style.display = 'none');
        if(chips.length > 0){
          const badge = document.createElement('div');
          badge.className = 'more-badge';
          badge.textContent = '+' + chips.length + ' more';
          badge.onclick = e => { e.stopPropagation(); openDayFromCell(cell); };
          cell.appendChild(badge);
        }
        return;
      }

      // How many chips fit? Reserve space for badge if we'll need one
      const total = parseInt(cell.dataset.total || chips.length);
      const maxWithBadge  = Math.max(0, Math.floor((available - badgeH) / chipH));
      const maxWithoutBadge = Math.floor(available / chipH);

      let showCount;
      if(chips.length <= maxWithoutBadge){
        showCount = chips.length; // all fit, no badge needed
      } else {
        showCount = Math.max(0, maxWithBadge);
      }

      chips.forEach((c, i) => c.style.display = i < showCount ? '' : 'none');

      const hidden = total - showCount;
      if(hidden > 0){
        const badge = document.createElement('div');
        badge.className = 'more-badge';
        badge.textContent = '+' + hidden + ' more — see all';
        badge.onclick = e => { e.stopPropagation(); openDayFromCell(cell); };
        cell.appendChild(badge);
      }
    });
  }

  function openDayFromCell(cell){
    const d = parseInt(cell.dataset.cd);
    const ds = calY + '-' + String(calM+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const devs = getF().filter(ev => {
      const s=dt(ev.date), en=ev.end?dt(ev.end):s, t=dt(ds);
      return t>=s && t<=en;
    });
    if(devs.length === 1) openDet(devs[0].id);
    else openList(fmtL(ds), devs, ds);
  }

  // ── Kick off layout + ResizeObserver + window resize ────────────────────────
  requestAnimationFrame(()=>{
    setRowHeights();
    const scroll = document.getElementById('month-scroll');
    if(scroll && !scroll._roAttached){
      scroll._roAttached = true;
      // Watch month-scroll itself resize
      new ResizeObserver(()=>{ setRowHeights(); }).observe(scroll);
    }
    // Belt-and-suspenders: also watch the window directly
    if(!window._calResizeAttached){
      window._calResizeAttached = true;
      window.addEventListener('resize', ()=>{ setRowHeights(); });
    }
  });

  // ── Cell click for multi-event list ──
  document.querySelectorAll('.dcell:not(.ec)').forEach(cell=>{
    cell.addEventListener('click',function(ev){
      if(ev.target.dataset.eid||ev.target.classList.contains('more-badge'))return;
      const d=parseInt(this.dataset.cd);
      const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const devs=getF().filter(ev2=>{const s=dt(ev2.date),en=ev2.end?dt(ev2.end):s,t=dt(ds);return t>=s&&t<=en;});
      if(!devs.length)return;
      if(devs.length===1){openDet(devs[0].id);return;}
      openList(fmtL(ds),devs,ds);
    });
  });

  // ── Tooltip on chip hover (1.5s delay) ──
  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('mouseenter',function(ev){
      const id=this.dataset.eid;
      const evObj=events.find(x=>x.id===id);
      if(!evObj)return;
      const tip=tipEl;
      clearTimeout(tipTimer);
      tipTimer=setTimeout(()=>{

function rWeek(){

  const ts=TD();
  const DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const wl=`${dt(days[0]).toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${dt(days[6]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;

  // Build events per day, sorted by time
  const byDay={};
  days.forEach(d=>{
    byDay[d]=f.filter(ev=>{

      return t>=s&&t<=en;
    }).sort((a,b)=>{const ha=phr(a.time||''),hb=phr(b.time||'');return(ha<0?99:ha)-(hb<0?99:hb)||a.title.localeCompare(b.title);});

  let h=`<div class="cal-wrap">

      <div class="dow-row" style="flex-shrink:0;">`;

    h+=`<div class="dow" style="${isT?'color:#0a84ff;font-weight:800;':''}">${DOWS[i]} <span style="font-size:15px;font-weight:${isT?'800':'600'}">${dn}</span></div>`;

  // Attach trimming after render

function trimWeekChips(){
  const grid=document.getElementById('week-grid');
  if(!grid)return;

  // Set equal column heights — fill available space
  const wrap=document.getElementById('week-col-wrap');
  const dowRow=wrap?wrap.querySelector('.dow-row'):null;
  const dowH=dowRow?dowRow.offsetHeight:30;
  const totalH=wrap?wrap.offsetHeight:400;
  const colH=Math.max(60, totalH-dowH);
  grid.style.height=colH+'px';

  grid.querySelectorAll('.week-dcell').forEach(cell=>{
    cell.querySelectorAll('.more-badge').forEach(b=>b.remove());
    const chips=Array.from(cell.querySelectorAll('.chip'));
    chips.forEach(c=>c.style.display='');
    if(!chips.length)return;

    const available=cell.offsetHeight-6;
    const chipH=21;
    const badgeH=14;
    const total=parseInt(cell.dataset.total||chips.length);
    const maxWithBadge=Math.max(0,Math.floor((available-badgeH)/chipH));
    const maxWithout=Math.floor(available/chipH);
    const showCount=chips.length<=maxWithout?chips.length:Math.max(0,maxWithBadge);

    chips.forEach((c,i)=>c.style.display=i<showCount?'':'none');
    const hidden=total-showCount;
    if(hidden>0){
      const badge=document.createElement('div');
      badge.className='more-badge';
      badge.textContent=`+${hidden} more — see all`;
      badge.onclick=e=>{e.stopPropagation();const wd=cell.dataset.wd;const devs=getF().filter(ev=>{const s=dt(ev.date),en=ev.end?dt(ev.end):s,t=dt(wd);return t>=s&&t<=en;});openList(fmtL(wd),devs);};
      cell.appendChild(badge);
    }
  });

  // Attach click and tooltip to chips
  grid.querySelectorAll('.chip').forEach(chip=>{
    chip.onclick=function(e){e.stopPropagation();openDet(this.dataset.eid);};
    chip.addEventListener('mouseenter',function(){
      const id=this.dataset.eid;const evObj=events.find(x=>x.id===id);if(!evObj)return;
      clearTimeout(tipTimer);
      tipTimer=setTimeout(()=>{
        const snippet=(evObj.desc||evObj.title).slice(0,80)+(((evObj.desc||'').length>80)?'…':'');
        tipEl.textContent=snippet;tipEl.style.display='block';
        const rect=this.getBoundingClientRect();
        let top=rect.bottom+4,left=rect.left;
        if(top+70>window.innerHeight)top=rect.top-70;
        if(left+230>window.innerWidth)left=window.innerWidth-240;
        tipEl.style.top=top+'px';tipEl.style.left=left+'px';
      },1500);
    });
    chip.addEventListener('mouseleave',()=>{clearTimeout(tipTimer);if(tipEl)tipEl.style.display='none';});
  });

  // ResizeObserver
  if(wrap&&!wrap._roWeek){
    wrap._roWeek=true;
    new ResizeObserver(()=>trimWeekChips()).observe(wrap);
    window.addEventListener('resize',()=>trimWeekChips());
  }
}

// ── Add To Calendar helpers ────────────────────────────────────────────────
function calDT(dateStr, timeStr, offsetHours){
  // Returns a UTC datetime string for calendar URLs
  // offsetHours: duration in hours (default 2)
  const d = new Date(dateStr + 'T12:00:00');
  let hh = 12, mm = 0;
  if(timeStr){
    const m = timeStr.match(/(\d+)(?::(\d+))?\s*(AM|PM)/i);
    if(m){
      hh = parseInt(m[1]); mm = parseInt(m[2]||'0');
      if(m[3].toUpperCase()==='PM' && hh!==12) hh+=12;
      if(m[3].toUpperCase()==='AM' && hh===12) hh=0;
    }
  }
  d.setHours(hh, mm, 0, 0);
  const fmt = dt => dt.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const start = new Date(d);
  const end   = new Date(d.getTime() + (offsetHours||2)*3600000);
  return {start: fmt(start), end: fmt(end)};
}

function buildAtcUrls(ev){
  const {start, end} = calDT(ev.date, ev.time, 2);
  const title  = encodeURIComponent(ev.title);
  const loc    = encodeURIComponent([ev.venue, ev.addr].filter(Boolean).join(', '));
  const desc   = encodeURIComponent((ev.desc||'').slice(0,500) + (ev.url ? '\n\nMore info: '+ev.url : ''));

  return {
    google: `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&location=${loc}&details=${desc}`,
    apple:  `data:text/calendar;charset=utf8,BEGIN:VCALENDAR%0AVERSION:2.0%0ABEGIN:VEVENT%0ADTSTART:${start}%0ADTEND:${end}%0ASUMMARY:${title}%0ALOCATION:${loc}%0ADESCRIPTION:${desc}%0AEND:VEVENT%0AEND:VCALENDAR`,
    outlook:`https://outlook.live.com/calendar/0/deeplink/compose?subject=${title}&startdt=${start}&enddt=${end}&location=${loc}&body=${desc}&path=%2Fcalendar%2Faction%2Fcompose&rru=addevent`,
    yahoo:  `https://calendar.yahoo.com/?v=60&title=${title}&st=${start}&et=${end}&in_loc=${loc}&desc=${desc}`,
    ics:    `data:text/calendar;charset=utf8,BEGIN:VCALENDAR%0AVERSION:2.0%0APRODID:-//Reno Tahoe Events//EN%0ABEGIN:VEVENT%0ADTSTART:${start}%0ADTEND:${end}%0ASUMMARY:${title}%0ALOCATION:${loc}%0ADESCRIPTION:${desc}%0AEND:VEVENT%0AEND:VCALENDAR`,
  };
}

  const menu = btn.parentElement.querySelector('.atc-menu');
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.atc-menu.open,.share-menu.open').forEach(m=>m.classList.remove('open'));
  if(!isOpen) menu.classList.add('open');
}

// Close ATC menu when clicking outside
document.addEventListener('click', function(e){
  if(!e.target.closest('.atc-wrap') && !e.target.closest('.share-wrap')) {
    document.querySelectorAll('.atc-menu.open,.share-menu.open').forEach(m=>m.classList.remove('open'));
  }
});

function openDet(id){

        <div class="det-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span><strong>${esc(ev.venue)}</strong>${ev.addr?`<small>${esc(ev.addr)}</small>`:''}</span></div>
        ${ev.price?`<div class="det-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2z"/></svg><span>${esc(ev.price)}</span></div>`:''}
        <div class="det-row"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span>${rl}</span></div>
      </div>

    </div>

          <a class="atc-item" href="${u.yahoo}" target="_blank" rel="noopener" onclick="document.querySelectorAll('.atc-menu').forEach(m=>m.classList.remove('open'))">

            <span>Download .ics</span>
            <small>Any calendar app</small>

          `})()}
        </div>
      </div>
      <div class="share-wrap">
        <button class="share-btn" onclick="toggleShareMenu(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share
        </button>
        <div class="share-menu" id="share-fallback-menu">
          ${buildShareMenu(ev)}
        </div>
      </div>

    </div>`);
}

// Fetch events.json then boot
fetch('events.json')
  .then(r => r.json())
  .then(data => {
    SEED = data;
    events = [...SEED];
    boot();
  })
  .catch(err => {
    document.getElementById('main').innerHTML = '<div class="empty"><p>Could not load events. Please refresh.</p></div>';
    console.error('Failed to load events.json:', err);
  });
