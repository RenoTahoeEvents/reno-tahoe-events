name: Scrape Events (Hourly)
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run scrapers
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        run: python3 scrapers/scrape_all.py --out events.json
      - name: Commit if changed
        run: |
          git config user.name "Scraper Bot"
          git config user.email "bot@reno-tahoe-events.app"
          git add events.json
          git diff --cached --quiet || git commit -m "scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force-with-lease
